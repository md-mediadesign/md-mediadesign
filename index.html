<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>md mediadesign — Bald wieder für Sie da</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d1220;
      color: #f1f5f9;
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none;
      touch-action: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(13,18,32,0.10) 0%,
        rgba(13,18,32,0.40) 50%,
        rgba(13,18,32,0.88) 100%
      );
    }

    .content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .logo {
      height: 144px;
      width: auto;
      margin-bottom: 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #6a9fdf;
      background: rgba(74,128,208,0.1);
      border: 1px solid rgba(74,128,208,0.25);
      border-radius: 100px;
      margin-bottom: 32px;
    }

    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4a80d0;
      box-shadow: 0 0 8px #4a80d0;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px #4a80d0; }
      50%       { box-shadow: 0 0 16px #4a80d0; }
    }

    h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: #f1f5f9;
      margin-bottom: 24px;
    }

    h1 span {
      background: linear-gradient(120deg, #6a9fdf, #7ab4e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: clamp(16px, 2vw, 19px);
      color: #94a3b8;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 48px;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }

    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
      background: rgba(74,128,208,0.1);
      border: 1px solid rgba(74,128,208,0.2);
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    .contact a:hover {
      background: rgba(74,128,208,0.18);
      border-color: rgba(74,128,208,0.4);
      transform: translateY(-2px);
    }

    .contact svg {
      opacity: 0.6;
      flex-shrink: 0;
    }

    .footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      color: #334155;
      z-index: 10;
    }

    /* Entrance animation */
    .content > * {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s ease forwards;
    }
    .logo      { animation-delay: 0.1s; }
    .badge     { animation-delay: 0.25s; }
    h1         { animation-delay: 0.4s; }
    p          { animation-delay: 0.55s; }
    .contact   { animation-delay: 0.7s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>
  <div class="overlay"></div>

  <div class="content">
    <img src="assets/logo.png" alt="md mediadesign" class="logo">

    <div class="badge">
      <span class="badge-dot"></span>
      Neue Website in Kürze
    </div>

    <h1>Wir arbeiten<br>an etwas <span>Besonderem.</span></h1>

    <p>Unsere neue Website wird gerade für Sie fertiggestellt. In der Zwischenzeit erreichen Sie uns jederzeit direkt.</p>

    <div class="contact">
      <a href="mailto:mail@md-mediadesign.de">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        mail@md-mediadesign.de
      </a>
    </div>
  </div>

  <div class="footer">&copy; 2026 md mediadesign — build with 🍕 and ❤️</div>

  <script>
    (function () {
      const canvas = document.getElementById('c');
      const gl = canvas.getContext('webgl2');
      if (!gl) return;

      const VS = `#version 300 es
precision highp float;
in vec4 position;
void main(){ gl_Position = position; }`;

      const FS = `#version 300 es
precision highp float;
out vec4 O;
uniform vec2  resolution;
uniform float time;
#define FC gl_FragCoord.xy
#define T  time
#define R  resolution
#define MN min(R.x,R.y)

float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}
float noise(in vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);float a=rnd(i),b=rnd(i+vec2(1,0)),c=rnd(i+vec2(0,1)),d=rnd(i+1.);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}
float fbm(vec2 p){float t=.0,a=1.;mat2 m=mat2(1.,-.5,.2,1.2);for(int i=0;i<5;i++){t+=a*noise(p);p*=2.*m;a*=.5;}return t;}
float clouds(vec2 p){float d=1.,t=.0;for(float i=.0;i<3.;i++){float a=d*fbm(i*10.+p.x*.2+.2*(1.+i)*p.y+d+i*i+p);t=mix(t,d,a);d=a;p*=2./(i+1.);}return t;}

void main(void){
  vec2 uv=(FC-.5*R)/MN, st=uv*vec2(2.,1.);
  vec3 col=vec3(0);
  float bg=clouds(vec2(st.x+T*.25,-st.y));
  uv*=1.-.3*(sin(T*.1)*.5+.5);
  for(float i=1.;i<12.;i++){
    uv+=.1*cos(i*vec2(.1+.01*i,.8)+i*i+T*.25+.1*uv.x);
    vec2 p=uv; float d=length(p);
    col+=.00125/d*(cos(sin(i)*vec3(3.,1.,2.))+1.);
    float b=noise(i+p+bg*1.731);
    col+=.002*b/length(max(p,vec2(b*p.x*.02,p.y)));
    col=mix(col,vec3(bg*.05,bg*.04,bg*.25),d);
  }
  float lum=dot(col,vec3(.2126,.7152,.0722));
  vec3 dark=vec3(.05,.07,.14), mid=vec3(.29,.50,.82), cloud=vec3(.88,.92,1.00);
  col=mix(dark,mid,smoothstep(.0,.30,lum));
  col=mix(col,cloud,smoothstep(.25,.70,lum));
  col.r*=.82; col.g*=.92;
  col*=1.15;
  col=pow(max(col,vec3(0.)),vec3(.80));
  O=vec4(col,1.);
}`;

      function sh(type, src) {
        const s = gl.createShader(type);
        gl.shaderSource(s, src); gl.compileShader(s); return s;
      }
      const prog = gl.createProgram();
      gl.attachShader(prog, sh(gl.VERTEX_SHADER, VS));
      gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, FS));
      gl.linkProgram(prog); gl.useProgram(prog);

      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, 'position');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

      const uRes  = gl.getUniformLocation(prog, 'resolution');
      const uTime = gl.getUniformLocation(prog, 'time');

      let dpr, start = null;

      function resize() {
        dpr = Math.max(1, 0.5 * devicePixelRatio);
        canvas.width  = innerWidth  * dpr;
        canvas.height = innerHeight * dpr;
        gl.viewport(0, 0, canvas.width, canvas.height);
      }

      window.addEventListener('resize', resize, { passive: true });
      resize();

      (function loop(now) {
        if (!start) start = now;
        gl.clearColor(0,0,0,1); gl.clear(gl.COLOR_BUFFER_BIT);
        gl.useProgram(prog); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.uniform1f(uTime, (now - start) * 1e-3);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        requestAnimationFrame(loop);
      })(0);
    })();
  </script>

</body>
</html>
